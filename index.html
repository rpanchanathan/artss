<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classic Art Screensaver</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
  }
  body.idle-cursor { cursor: none; }
  #stage { position: fixed; inset: 0; }
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.4s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }
  .slide img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
    animation: kenburns var(--dur) ease-in-out forwards;
  }
  @keyframes kenburns {
    from { transform: scale(1.0); }
    to   { transform: scale(1.08); }
  }
  .header {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 3vw 4vw 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.75) 60%, rgba(0,0,0,0) 100%);
    color: #f2ede4;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .header.show { opacity: 1; transform: translateY(0); }
  .header .title { font-size: 2.3vw; font-style: italic; margin: 0 0 0.3vw; line-height: 1.2; }
  .header .byline { font-size: 1.35vw; color: #d8cdb8; margin: 0 0 1.4vw; letter-spacing: 0.02em; }
  .panel {
    max-width: 78vw;
    padding-bottom: 3vw;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.7s ease;
  }
  .panel.show { opacity: 1; max-height: none; }
  .panel h4 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.95vw; text-transform: uppercase; letter-spacing: 0.12em;
    color: #b8a98a; margin: 0 0 0.5vw;
  }
  .panel p { font-size: 1.35vw; line-height: 1.45; margin: 0; color: #eee6d8; }
  /* Split layout: painting left, text right, only while text is showing.
     Reuses the .header.show timing (same t1-t3 window) via .split-active. */
  body.layout-split .slide.split-active { display: flex; flex-direction: row; }
  body.layout-split .slide.split-active img {
    position: relative; flex: 0 0 58%; width: 58%; height: 100%;
  }
  body.layout-split .slide.split-active .header {
    position: relative; flex: 0 0 42%; width: 42%; height: 100%; inset: auto;
    background: linear-gradient(180deg, #0b0b0b, #050505);
    display: flex; flex-direction: column; justify-content: center;
    padding: 3vw; transform: none;
  }
  body.layout-split .slide.split-active .header .title { font-size: 1.7vw; }
  body.layout-split .slide.split-active .header .byline { font-size: 1.1vw; }
  body.layout-split .slide.split-active .panel { max-width: none; }
  body.layout-split .slide.split-active .panel p { font-size: 1.15vw; }
  .progress { position: absolute; top: 0; left: 0; height: 3px; background: rgba(255,255,255,0.55); width: 0%; z-index: 10; }
  #hint {
    position: fixed; top: 2vh; right: 2vw; color: rgba(255,255,255,0.35);
    font-family: Arial, sans-serif; font-size: 0.9vw; text-align: right;
    transition: opacity 0.4s; z-index: 10;
  }
  #hint.hidden { opacity: 0; }
  #toast {
    position: fixed; bottom: 2vh; left: 50%; transform: translateX(-50%) translateY(8px);
    color: #f2ede4; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
    padding: 0.6vw 1.2vw; border-radius: 6px; font-family: Arial, sans-serif; font-size: 0.95vw;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; z-index: 10; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="stage"></div>
<div class="progress" id="progress"></div>
<div id="hint">space: pause &middot; &larr;: prev painting &middot; &rarr;: skip to next phase &middot; +/-: show more/less often</div>
<div id="toast"></div>

<script>
// ---- Tunable config ----
// Each slide plays through four phases, in seconds:
//   1. introSec  - painting alone, no text at all
//   2. sceneSec  - title appears, plus "The Scene" panel
//   3. bigDealSec - title stays, "The Scene" swaps out for "Why It's a Big Deal"
//   4. outroSec  - all text hidden, painting alone in full, unobstructed
// Override via URL, e.g. ?intro=20&scene=30&bigDeal=30&outro=45
const CONFIG = {
  introSec: 20,
  sceneSec: 30,
  bigDealSec: 30,
  outroSec: 45,
  shuffle: true,
  layoutSplit: false,
};
(function applyUrlOverrides() {
  const p = new URLSearchParams(location.search);
  if (p.has('intro')) CONFIG.introSec = parseFloat(p.get('intro'));
  if (p.has('scene')) CONFIG.sceneSec = parseFloat(p.get('scene'));
  if (p.has('bigDeal')) CONFIG.bigDealSec = parseFloat(p.get('bigDeal'));
  if (p.has('outro')) CONFIG.outroSec = parseFloat(p.get('outro'));
  if (p.has('shuffle')) CONFIG.shuffle = p.get('shuffle') !== '0';
  if (p.get('layout') === 'split') CONFIG.layoutSplit = true;
})();
if (CONFIG.layoutSplit) document.body.classList.add('layout-split');

const stage = document.getElementById('stage');
const progressEl = document.getElementById('progress');
const hintEl = document.getElementById('hint');
const toastEl = document.getElementById('toast');

let artworks = [];
let order = [];
let idx = 0;
let paused = false;
let timers = [];
let slideStart = 0;
let remainingOnPause = null;

// ---- Per-device viewing stats (localStorage), Anki-style frequency control ----
// Each artwork gets a seen count (deprioritizes it as it repeats) and a user
// multiplier (adjustable live with +/-, so "show this more/less often" sticks
// across sessions on this device).
const STATS_KEY = 'artss-stats-v1';
function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch { return {}; }
}
function saveStats() {
  try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch {}
}
let stats = loadStats();
function statFor(id) {
  if (!stats[id]) stats[id] = { seen: 0, mult: 1 };
  return stats[id];
}
function weightFor(art) {
  const s = statFor(art.id);
  return s.mult / (1 + s.seen);
}

// Weighted random permutation (Efraimidis-Spirakis A-ES): higher weight ==
// more likely to land earlier in the shuffled order, without ever excluding
// low-weight items outright.
function buildWeightedOrder(indices) {
  return indices
    .map(i => ({ i, key: Math.pow(Math.random(), 1 / weightFor(artworks[i])) }))
    .sort((a, b) => b.key - a.key)
    .map(x => x.i);
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function adjustFrequency(factor, label) {
  if (!order.length) return;
  const art = artworks[order[idx]];
  const s = statFor(art.id);
  s.mult = Math.max(0.15, Math.min(6, s.mult * factor));
  saveStats();
  showToast(label);
}

function clearTimers() {
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

function breakpointsMs() {
  const t1 = CONFIG.introSec * 1000;
  const t2 = t1 + CONFIG.sceneSec * 1000;
  const t3 = t2 + CONFIG.bigDealSec * 1000;
  const t4 = t3 + CONFIG.outroSec * 1000;
  return { t1, t2, t3, t4 };
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}

function buildSlide(art) {
  const el = document.createElement('div');
  el.className = 'slide';
  const { t4 } = breakpointsMs();
  el.innerHTML = `
    <img src="${art.image}" style="--dur:${t4 / 1000 + 1.5}s" alt="${escapeHtml(art.title)}">
    <div class="header">
      <div class="title">${escapeHtml(art.title)}</div>
      <div class="byline">${escapeHtml(art.artist)} &middot; ${escapeHtml(art.year)}</div>
      <div class="panel panel-scene">
        <h4>The Scene</h4>
        <p>${escapeHtml(art.sceneContext)}</p>
      </div>
      <div class="panel panel-bigdeal">
        <h4>Why It's a Big Deal</h4>
        <p>${escapeHtml(art.whyBigDeal)}</p>
      </div>
    </div>
  `;
  return el;
}

function showSlide(newIdx) {
  clearTimers();
  const art = artworks[order[newIdx]];
  statFor(art.id).seen++;
  saveStats();
  const el = buildSlide(art);
  stage.appendChild(el);
  requestAnimationFrame(() => el.classList.add('active'));

  const old = Array.from(stage.children).filter(c => c !== el);
  old.forEach(o => { o.classList.remove('active'); setTimeout(() => o.remove(), 1600); });

  el._header = el.querySelector('.header');
  el._scene = el.querySelector('.panel-scene');
  el._bigDeal = el.querySelector('.panel-bigdeal');

  runTimeline(el, 0);
}

function runTimeline(el, elapsedMs) {
  const { t1, t2, t3, t4 } = breakpointsMs();
  slideStart = Date.now() - elapsedMs;

  progressEl.style.transition = 'none';
  progressEl.style.width = (elapsedMs / t4 * 100) + '%';
  requestAnimationFrame(() => {
    progressEl.style.transition = `width ${t4 - elapsedMs}ms linear`;
    progressEl.style.width = '100%';
  });

  // Set immediate state based on which phase we're resuming into.
  // Header (title/byline) shows during scene + big deal, hidden in outro so
  // the painting is unobstructed at the end.
  const showHeader = elapsedMs >= t1 && elapsedMs < t3;
  const showScene = elapsedMs >= t1 && elapsedMs < t2;
  const showBigDeal = elapsedMs >= t2 && elapsedMs < t3;
  el._header.classList.toggle('show', showHeader);
  el._scene.classList.toggle('show', showScene);
  el._bigDeal.classList.toggle('show', showBigDeal);
  el.classList.toggle('split-active', showHeader);

  const schedule = (atMs, fn) => {
    const delay = atMs - elapsedMs;
    if (delay > 0) timers.push(setTimeout(fn, delay));
  };

  schedule(t1, () => { el._header.classList.add('show'); el.classList.add('split-active'); });
  schedule(t1, () => el._scene.classList.add('show'));
  schedule(t2, () => el._scene.classList.remove('show'));
  schedule(t2, () => el._bigDeal.classList.add('show'));
  schedule(t3, () => el._bigDeal.classList.remove('show'));
  schedule(t3, () => { el._header.classList.remove('show'); el.classList.remove('split-active'); });
  schedule(t4, next);

  el._totalMs = t4;
}

function next() {
  idx = idx + 1;
  if (idx >= order.length) {
    idx = 0;
    // Full pass done — rebuild the weighted order using updated seen counts
    // and any +/- adjustments made during this pass.
    if (CONFIG.shuffle) order = buildWeightedOrder(artworks.map((_, i) => i));
  }
  showSlide(idx);
}
function prev() {
  idx = (idx - 1 + order.length) % order.length;
  showSlide(idx);
}

// Jump straight to the next phase (intro -> scene -> big deal -> outro -> next
// painting). Lets you skip ahead once you no longer need the full dwell time
// on a given phase.
function skipForward() {
  const el = stage.querySelector('.slide.active');
  if (!el) return;
  const elapsed = paused ? (el._totalMs - remainingOnPause) : (Date.now() - slideStart);
  const { t1, t2, t3, t4 } = breakpointsMs();
  const nextBp = [t1, t2, t3, t4].find(t => t > elapsed + 50);
  if (nextBp === undefined) {
    next();
    return;
  }
  clearTimers();
  paused = false;
  runTimeline(el, nextBp >= t4 ? t4 - 1 : nextBp);
}

function togglePause() {
  paused = !paused;
  const el = stage.querySelector('.slide.active');
  if (!el) return;
  if (paused) {
    clearTimers();
    remainingOnPause = el._totalMs - (Date.now() - slideStart);
    progressEl.style.transition = 'none';
    const pct = (1 - remainingOnPause / el._totalMs) * 100;
    progressEl.style.width = pct + '%';
  } else {
    runTimeline(el, el._totalMs - remainingOnPause);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  else if (e.code === 'ArrowRight') skipForward();
  else if (e.code === 'ArrowLeft') prev();
  else if (e.code === 'Equal' || e.code === 'NumpadAdd') adjustFrequency(1.6, 'Will show this more often');
  else if (e.code === 'Minus' || e.code === 'NumpadSubtract') adjustFrequency(1 / 1.6, 'Will show this less often');
  hintEl.classList.remove('hidden');
  clearTimeout(window._hintTimer);
  window._hintTimer = setTimeout(() => hintEl.classList.add('hidden'), 4000);
});
window._hintTimer = setTimeout(() => hintEl.classList.add('hidden'), 4000);

// Hide the cursor after a few seconds of no mouse movement (irrelevant on a
// remote-controlled TV, but keeps things clean when viewed via a casted tab).
let cursorTimer = setTimeout(() => document.body.classList.add('idle-cursor'), 3000);
document.addEventListener('mousemove', () => {
  document.body.classList.remove('idle-cursor');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => document.body.classList.add('idle-cursor'), 3000);
});

fetch('artworks.json')
  .then(r => r.json())
  .then(data => {
    artworks = data;
    order = CONFIG.shuffle ? buildWeightedOrder(artworks.map((_, i) => i)) : artworks.map((_, i) => i);
    showSlide(0);
  })
  .catch(err => {
    stage.innerHTML = `<div style="color:#fff;padding:4vw;font-family:sans-serif">Failed to load artworks.json: ${err}</div>`;
  });
</script>
</body>
</html>
